<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏗️ งานยกรวมเหล็กแบน</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-main: #000000;
            --text-muted: #d10000;
            --card-bg: #ffffff;
            --border-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 0.2rem;
			margin: 0;
        }

        h1 {
			font-size: x-large;
            text-align: center;
            margin: 0px;
			margin-top: 0;
			margin-bottom: 1rem;
        }

        .group-container {
            margin-bottom: 40px;
			padding: 0.2rem;
			border-radius: 1rem;
			border: 1px solid var(--border-color);
			background-color: lightsteelblue;
        }

        .group-title {
            display: flex;
            align-items: center;
            justify-content: space-between; 
            gap: 15px;
            border-bottom: 2px solid var(--text-main);
			border-radius: 0.5rem;
            padding: 8px 15px; 
			margin-top: 0.1rem;
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: var(--text-main);
			background-color: #ffe000;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            padding: 1rem;
            transition: transform 0.2s ease-in-out, opacity 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .card-item {
            margin-bottom: 8px;
            font-size: 0.95rem;
            line-height: 1.0;
			gap: 1rem;
        }

        .card-item strong {
            color: var(--text-muted);
            display: inline-block;
            min-width: 80px; 
			font-size: 0.7rem;
        }
		
		target {
            color: var(--text-main);
            display: inline-block;
			font-size: 1rem;
			font-weight: bold;
        }
		
		milkrun {
            color: var(--text-main);
            display: inline-block;
			font-size: 1rem;
			background-color: #ff008d40;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .card-flex {
            display: flex;
            justify-content: space-between;
            gap: 0px;
            margin-bottom: 8px;
        }

        .card-flex .card-item {
            flex: 1; 
            margin-bottom: 0;
        }

        .card-flex .card-item strong {
            min-width: auto; 
            margin-right: 5px;
        }
        
        .error-message, .loading {
            color: #d32f2f;
            background: #ffebee;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        .btn-group-process {
            background-color: #4CAF50;
            color: white;
            border: 2px solid #388E3C;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            transition: background-color 0.2s;
            white-space: nowrap;
        }

        .btn-group-process:hover {
            background-color: #45a049;
        }
        
        .btn-group-process:disabled {
            background-color: #9e9e9e;
            border-color: #757575;
            cursor: not-allowed;
        }

        .btn-process {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .btn-process:hover {
            background-color: #45a049;
        }
        
        .btn-process:disabled {
            background-color: #9e9e9e;
            cursor: not-allowed;
        }
		
        .footer-text {
            font-size: 11px;
            text-align: right;
            margin-bottom: 3px;
            color: #777;
        }
        .footer-version {
            padding-top: 0px;
        }
	  
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #d32f2f; 
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            transform: translateX(-50%);
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            opacity: 0;
            transition: opacity 0.5s, bottom 0.5s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>
<body>

    <h1>🏗️ งานยกรวมเหล็กแบน</h1>
    
    <div id="toast">🚨 มีงานต้องยกรวม !</div>

    <div id="dashboard">
        <p style="text-align: center;">กำลังโหลดข้อมูล...</p>
    </div>
	<p id="version" class="footer-text footer-version">Version 2.9 Techinal Review</p>
    <p class="footer-text" style="margin-top: 0px;">Powered by Flatbar Division™️</p>

    <script>
	    loadVersion();
        const COLS = {
            A: 0, E: 4, F: 5, G: 6, H: 7, I: 8, 
            K: 10, M: 12, N: 13, O: 14, P: 15, Q: 16, T: 19
        };

        const part0 = "AIzaSyAFnyXSAki4Licz";
        const part1 = "KNhyEzbhHsvTC-abfAo";
        const apiKey = part0 + part1;
		const spreadsheetId = "1X_bUE98FYNBRGjVuvyTo8GTXPP9x8LHj6k-iaRJ9TBA";
        const range = "Database!A:T";

        let sheetData = [];
        let pendingJobsCount = 0; 
        
        async function loadData() {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${range}?key=${apiKey}`;
            const container = document.getElementById("dashboard");

            try {
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`);
                }

                const json = await response.json();

                if (!json.values || json.values.length === 0) {
                    container.innerHTML = "<div class='loading'>No data found.</div>";
                    return;
                }

                sheetData = json.values.slice(1);
                processData(sheetData);
            } catch (e) {
                console.error("Data fetch error:", e);
                container.innerHTML = `<div class='error-message'>Failed to load data: ${e.message}</div>`;
            }
        }
            
        loadData();
		setInterval(checkMove, 60000);

        function processData(data) {
            const filteredData = data.filter(row => {
                if (row.length <= COLS.P) return false; 
                
                const valO = row[COLS.O] ? row[COLS.O].trim() : "";
                const valP = row[COLS.P] ? row[COLS.P].trim() : "";
                const valQ = row[COLS.Q] ? row[COLS.Q].trim() : "";
                
                return valO !== "" && valP !== "" && valQ === "";
            });

            pendingJobsCount = filteredData.length;

            const groupedData = {};
            filteredData.forEach(row => {
                const groupKey = row[COLS.E] ? row[COLS.E].trim() : "Blank/Unknown";
                
                if (!groupedData[groupKey]) {
                    groupedData[groupKey] = [];
                }
                groupedData[groupKey].push(row);
            });

            renderDashboard(groupedData);
        }

        function renderDashboard(groupedData) {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = ""; 

            const groupNames = Object.keys(groupedData).sort();

            if (groupNames.length === 0) {
                dashboard.innerHTML = "<p style='text-align: center;font-size: larger;margin-top: 50px;'>🛑 ไม่พบข้อมูลรายการงานยกรวม. 🛑</p>";
                stopTabFlash(); 
                return;
            }

            const getVal = (row, index) => row[index] !== undefined ? row[index].trim() : "";

            groupNames.forEach(group => {
                const rows = groupedData[group];

                rows.sort((a, b) => {
                    const nameA = getVal(a, COLS.G);
                    const nameB = getVal(b, COLS.G);
                    return nameA.localeCompare(nameB, 'th');
                });

                const destGate = getVal(rows[0], COLS.O);
                const depositStatus = getVal(rows[0], COLS.T) || "-";

                const groupContainer = document.createElement('div');
                groupContainer.className = 'group-container';

                const groupTitle = document.createElement('h2');
                groupTitle.className = 'group-title';

                const titleText = document.createElement('div');
                titleText.style.display = 'flex';
                titleText.style.flexDirection = 'column';
                titleText.style.gap = '5px';
                titleText.innerHTML = `
                    <div>ทะเบียน: <strong>${group}</strong></div>
                    <div style="font-size: 0.95rem; font-weight: normal; color: #333;">
                        <strong>ปลายทาง:</strong> <target>➡️ ${destGate}</target> &nbsp;|&nbsp; 
                        <strong>สถานะงานฝาก:</strong> <milkrun>${depositStatus}</milkrun>
                    </div>
                `;

                const groupProcessBtn = document.createElement('button');
                groupProcessBtn.className = 'btn-group-process';
                groupProcessBtn.textContent = 'ยกสำเร็จ (ทั้งหมด)';
                groupProcessBtn.onclick = function() {
                    const container = this.closest('.group-container');
                    const cardButtons = container.querySelectorAll('.btn-process');
                    
                    this.disabled = true;
                    this.textContent = 'กำลังดำเนินการ...';
                    
                    cardButtons.forEach(btn => {
                        if (!btn.disabled) btn.click();
                    });
                };

                groupTitle.appendChild(titleText);
                groupTitle.appendChild(groupProcessBtn);
                
                groupContainer.appendChild(groupTitle);

                const cardGrid = document.createElement('div');
                cardGrid.className = 'card-grid';

                rows.forEach(row => {
                    const card = document.createElement('div');
                    card.className = 'card';
					
					const preparingText = getVal(row, COLS.N) || "⚠️ ยังไม่เตรียม";
                    const colAData = getVal(row, COLS.A); 

                    // ย้าย "ต้นทาง" ไปมุมขวาบน และเอา "การยกรวม" ออก
                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;">
                            <div class="card-item" style="margin-bottom: 0; padding-right: 10px;"><strong>ชื่อลูกค้า:</strong> ${getVal(row, COLS.K)}</div>
                            <div style="background-color: #e1f5fe; color: #0277bd; padding: 3px 8px; border-radius: 5px; font-size: 0.85rem; font-weight: bold; white-space: nowrap; border: 1px solid #b3e5fc;">
                                📍 ต้นทาง: ${getVal(row, COLS.M)}
                            </div>
                        </div>
                        
                        <div class="card-item" style="display: flex; flex-wrap: wrap;"><strong>ชื่อผลิตภัณฑ์:  </strong> ${getVal(row, COLS.G)}</div>
                        
                        <div class="card-flex">
                            <div class="card-item"><strong>จำนวน:</strong> ${getVal(row, COLS.I)} เส้น</div>
                            <div class="card-item"><strong>Batch:</strong> ${getVal(row, COLS.H)}</div>
                        </div>
                        
                        <div class="card-item"><strong>การเตรียม:</strong> ${preparingText}</div>
                        
                        <button class="btn-process" onclick="process('${colAData}', this)">ยกสำเร็จ</button>
                    `;

                    cardGrid.appendChild(card);
                });

                groupContainer.appendChild(cardGrid);
                dashboard.appendChild(groupContainer);
            });
        }

        async function process(columnAValue, buttonElement) {
            buttonElement.disabled = true;
            const originalText = buttonElement.innerText;
            buttonElement.innerText = "กำลังดำเนินการ..."; 

            const url = "https://script.google.com/macros/s/AKfycbwOkfPtojqCsirn7kfiquRGc4jr-P8IK9bIjIKDBVc2UkOgO4escS94fKlsTSNTZcSW/callback";
            const requestValue = JSON.stringify([
                "confirmShipOperator",
                JSON.stringify([[columnAValue]]),
                null,
                [0],
                null,
                null,
                1,
                0
            ]);

            const payload = new URLSearchParams();
            payload.append("request", requestValue);

            const options = {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8",
                    "Accept": "*/*"
                },
                body: payload
            };
            
            const checkAndHideGroup = (cardElem) => {
                const groupContainer = cardElem.closest('.group-container');
                if (groupContainer) {
                    const visibleCards = Array.from(groupContainer.querySelectorAll('.card')).filter(c => c.style.display !== 'none');
                    if (visibleCards.length === 0) {
                        groupContainer.style.display = 'none';
                    }
                }
            };

            try {
                const response = await fetch(url, options);
                
                if (response.ok) {
                    const card = buttonElement.closest('.card');
                    if (card) {
                        card.style.display = 'none'; 
                        checkAndHideGroup(card); 
                        
                        pendingJobsCount = Math.max(0, pendingJobsCount - 1); 
                        if (pendingJobsCount === 0) stopTabFlash(); 
                    }
                } else {
                    buttonElement.disabled = false;
                    buttonElement.innerText = originalText;
                    alert("Error: " + response.status + " - Please try again.");
                }
                
            } catch (error) {
                console.error("Fetch failed:", error);
                const card = buttonElement.closest('.card');
                if (card) {
                    card.style.display = 'none'; 
                    checkAndHideGroup(card); 
                    pendingJobsCount = Math.max(0, pendingJobsCount - 1); 
                    if (pendingJobsCount === 0) stopTabFlash();
                }
            }
        }

        function checkMove() {
            loadData();
            setTimeout(() => {
                if (pendingJobsCount > 0) {
                    showToast();
                    playChime();
                    startTabFlash();
                } else {
                    stopTabFlash();
                }
            }, 1500); 
        }

        function showToast() {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(function(){ 
                toast.className = toast.className.replace("show", ""); 
            }, 4000);
        }

        let originalTitle = document.title;
        let flashInterval = null;
        let isTabFlashing = false;

        function startTabFlash() {
            if (isTabFlashing) return;
            isTabFlashing = true;
            flashInterval = setInterval(() => {
                document.title = document.title === originalTitle ? "🚨 มีงานใหม่!" : originalTitle;
            }, 1000);
        }

        function stopTabFlash() {
            if (!isTabFlashing) return;
            isTabFlashing = false;
            clearInterval(flashInterval);
            document.title = originalTitle;
        }

        let audioCtx = null;

        document.addEventListener('click', function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            document.removeEventListener('click', initAudio);
        }, { once: true });

        function playChime() {
            if (!audioCtx) return; 

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.15); 
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        async function loadVersion() {
            try {
                const response = await fetch(
                    'https://raw.githubusercontent.com/chai2686/flatbar_projects.github.io/refs/heads/main/version_history.log'
                );
                const text = await response.text();
                const firstLine = text.split(/\r?\n/)[0];
                document.getElementById('version').textContent = firstLine;
            } catch (error) {
                console.error(error);
                document.getElementById('version').textContent = 'Failed to load version';
            }
        }
    </script>
</body>
</html>
