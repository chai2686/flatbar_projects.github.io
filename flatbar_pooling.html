<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏗️ งานยกรวมเหล็กแบน</title>
    <!-- Include PapaParse library for CSV parsing (Left in case you revert to CSV) -->
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-main: #000000;
            --text-muted: #d10000;
            --card-bg: #ffffff;
            --border-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 0.2rem;
			margin: 0;
        }

        h1 {
			font-size: x-large;
            text-align: center;
            margin: 0px;
			margin-top: 0;
			margin-bottom: 1rem;
        }

        .group-container {
            margin-bottom: 40px;
			padding: 0.2rem;
			border-radius: 1rem;
			border: 1px solid var(--border-color);
			background-color: lightsteelblue;
        }

        .group-title {
            /* Updated: flex and space-between push the text left and button right */
            display: flex;
            align-items: center;
            justify-content: space-between; 
            gap: 15px;
            
            border-bottom: 2px solid var(--text-main);
			border-radius: 0.5rem;
            padding: 8px 15px; 
			margin-top: 0.1rem;
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: var(--text-main);
			background-color: #ffe000;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            padding: 1rem;
            transition: transform 0.2s ease-in-out, opacity 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .card-item {
            margin-bottom: 8px;
            font-size: 0.95rem;
            line-height: 1.0;
			gap: 1rem;
        }

        .card-item strong {
            color: var(--text-muted);
            display: inline-block;
            min-width: 95px; 
			font-size: 0.7rem;
        }
		
		.card-item target {
            color: var(--text-main);
            display: inline-block;
            min-width: 95px; 
			font-size: 1rem;
			font-weight: bold;
        }
		
		.card-item milkrun {
            color: var(--text-main);
            display: inline-block;
            min-width: 95px; 
			font-size: 1rem;
			background-color: #ff008d40;
        }

        .card-flex {
            display: flex;
            justify-content: space-between;
            gap: 0px;
            margin-bottom: 8px;
        }

        .card-flex .card-item {
            flex: 1; 
            margin-bottom: 0;
        }

        .card-flex .card-item strong {
            min-width: auto; 
            margin-right: 5px;
        }
        
        .error-message, .loading {
            color: #d32f2f;
            background: #ffebee;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
        }

        /* Styling for the Group Header Process Button */
        .btn-group-process {
            background-color: #4CAF50;
            color: white;
            border: 2px solid #388E3C;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: bold;
            transition: background-color 0.2s;
            white-space: nowrap;
        }

        .btn-group-process:hover {
            background-color: #45a049;
        }
        
        .btn-group-process:disabled {
            background-color: #9e9e9e;
            border-color: #757575;
            cursor: not-allowed;
        }

        /* Styling for the Individual Process Button */
        .btn-process {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .btn-process:hover {
            background-color: #45a049;
        }
        
        .btn-process:disabled {
            background-color: #9e9e9e;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>🏗️ งานยกรวมเหล็กแบน</h1>
    <div id="dashboard">
        <p style="text-align: center;">กำลังโหลดข้อมูล...</p>
    </div>

    <script>
        const COLS = {
            A: 0, E: 4, F: 5, G: 6, H: 7, I: 8, 
            K: 10, M: 12, N: 13, O: 14, P: 15, Q: 16, T: 19
        };

        const part0 = "AIzaSyAFnyXSAki4Licz";
        const part1 = "KNhyEzbhHsvTC-abfAo";
        const apiKey = part0 + part1;
		const spreadsheetId = "1IkO_AxMnh_yYFDsEV_7MAaGUCrgXptbby6et7Rt-T5w";
        const range = "Shipment!A:T";

        let sheetData = [];
        let pendingJobsCount = 0; // NEW: Track the number of active, unfiltered jobs
        
        async function loadData() {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${range}?key=${apiKey}`;
            const container = document.getElementById("dashboard");

            try {
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP Error: ${response.status}`);
                }

                const json = await response.json();

                if (!json.values || json.values.length === 0) {
                    container.innerHTML = "<div class='loading'>No data found.</div>";
                    return;
                }

                sheetData = json.values.slice(1);
                processData(sheetData);
            } catch (e) {
                console.error("Data fetch error:", e);
                container.innerHTML = `<div class='error-message'>Failed to load data: ${e.message}</div>`;
            }
        }
            
        loadData();
		setInterval(checkMove, 30000);

        function processData(data) {
            const filteredData = data.filter(row => {
                if (row.length <= COLS.P) return false; 
                
                const valO = row[COLS.O] ? row[COLS.O].trim() : "";
                const valP = row[COLS.P] ? row[COLS.P].trim() : "";
                const valQ = row[COLS.Q] ? row[COLS.Q].trim() : "";
                
                return valO !== "" && valP !== "" && valQ === "";
            });

            // Set global variable so checkMove knows exactly how many valid cards are displayed
            pendingJobsCount = filteredData.length;

            const groupedData = {};
            filteredData.forEach(row => {
                const groupKey = row[COLS.E] ? row[COLS.E].trim() : "Blank/Unknown";
                
                if (!groupedData[groupKey]) {
                    groupedData[groupKey] = [];
                }
                groupedData[groupKey].push(row);
            });

            renderDashboard(groupedData);
        }

        function renderDashboard(groupedData) {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = ""; 

            const groupNames = Object.keys(groupedData).sort();

            if (groupNames.length === 0) {
                dashboard.innerHTML = "<p style='text-align: center;font-size: larger;margin-top: 50px;'>🛑 ไม่พบข้อมูลรายการงานยกรวม. 🛑</p>";
                return;
            }

            const getVal = (row, index) => row[index] !== undefined ? row[index].trim() : "";

            groupNames.forEach(group => {
                const rows = groupedData[group];

                const groupContainer = document.createElement('div');
                groupContainer.className = 'group-container';

                const groupTitle = document.createElement('h2');
                groupTitle.className = 'group-title';

                // Title Text (Now created first to sit on the Left Side)
                const titleText = document.createElement('span');
                titleText.textContent = `ทะเบียน: ${group}`;

                // Group Header Button (Now created second to sit on the Right Side)
                const groupProcessBtn = document.createElement('button');
                groupProcessBtn.className = 'btn-group-process';
                groupProcessBtn.textContent = 'ยกสำเร็จ';
                groupProcessBtn.onclick = function() {
                    const container = this.closest('.group-container');
                    const cardButtons = container.querySelectorAll('.btn-process');
                    
                    this.disabled = true;
                    this.textContent = 'กำลังดำเนินการ...';
                    
                    cardButtons.forEach(btn => {
                        if (!btn.disabled) btn.click();
                    });
                };

                // Append text first, then button, so flex space-between splits them appropriately
                groupTitle.appendChild(titleText);
                groupTitle.appendChild(groupProcessBtn);
                
                groupContainer.appendChild(groupTitle);

                const cardGrid = document.createElement('div');
                cardGrid.className = 'card-grid';

                rows.forEach(row => {
                    const card = document.createElement('div');
                    card.className = 'card';
					
					const preparingText = getVal(row, COLS.N) || "⚠️ ยังไม่เตรียม";
					const moveText = getVal(row, COLS.Q) || "⚠️ ยังไม่ยกรวม";
                    const colAData = getVal(row, COLS.A); 

                    card.innerHTML = `
                        <div class="card-item"><strong>ชื่อลูกค้า:</strong> ${getVal(row, COLS.K)}</div>
                        <div class="card-item" style="display: flex; flex-wrap: wrap;"><strong>ชื่อผลิตภัณฑ์:  </strong> ${getVal(row, COLS.G)}</div>
                        
                        <div class="card-flex">
                            <div class="card-item"><strong>จำนวน:</strong> ${getVal(row, COLS.I)} เส้น</div>
                            <div class="card-item"><strong>Batch:</strong> ${getVal(row, COLS.H)}</div>
                        </div>
                        
                        <div class="card-item"><strong>การเตรียม:</strong> ${preparingText}</div>
                        
                        <div class="card-flex">
                            <div class="card-item"><strong>ต้นทาง:</strong> ${getVal(row, COLS.M)}</div>
                            <div class="card-item"><strong>ปลายทาง:</strong><target> ➡️ ${getVal(row, COLS.O)}</target></div>
                        </div>
                        
                        <div class="card-item"><strong>การยกรวม:</strong> ${moveText}</div>
                        <div class="card-item"><strong>สถานะงานฝาก:</strong><milkrun> ${getVal(row, COLS.T)}</milkrun></div>
                        
                        <button class="btn-process" onclick="process('${colAData}', this)">ยกสำเร็จ</button>
                    `;

                    cardGrid.appendChild(card);
                });

                groupContainer.appendChild(cardGrid);
                dashboard.appendChild(groupContainer);
            });
        }

        async function process(columnAValue, buttonElement) {
            buttonElement.disabled = true;
            const originalText = buttonElement.innerText;
            buttonElement.innerText = "กำลังดำเนินการ..."; 

            const url = "https://script.google.com/macros/s/AKfycbwOkfPtojqCsirn7kfiquRGc4jr-P8IK9bIjIKDBVc2UkOgO4escS94fKlsTSNTZcSW/callback";
            const requestValue = JSON.stringify([
                "confirmShipOperator",
                JSON.stringify([[columnAValue]]),
                null,
                [0],
                null,
                null,
                1,
                0
            ]);
            
            console.log("Request Payload:", requestValue);

            const payload = new URLSearchParams();
            payload.append("request", requestValue);

            const options = {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8",
                    "Accept": "*/*"
                },
                body: payload
            };
            
            const checkAndHideGroup = (cardElem) => {
                const groupContainer = cardElem.closest('.group-container');
                if (groupContainer) {
                    const visibleCards = Array.from(groupContainer.querySelectorAll('.card')).filter(c => c.style.display !== 'none');
                    if (visibleCards.length === 0) {
                        groupContainer.style.display = 'none';
                    }
                }
            };

            try {
                const response = await fetch(url, options);
                console.log("Status Code: " + response.status);
                
                const responseText = await response.text();
                console.log("Response Body: " + responseText);

                if (response.ok) {
                    const card = buttonElement.closest('.card');
                    if (card) {
                        card.style.display = 'none'; 
                        checkAndHideGroup(card); 
                        // Decrement the active jobs count locally
                        pendingJobsCount = Math.max(0, pendingJobsCount - 1); 
                    }
                } else {
                    buttonElement.disabled = false;
                    buttonElement.innerText = originalText;
                    alert("Error: " + response.status + " - Please try again.");
                }
                
            } catch (error) {
                console.error("Fetch failed:", error);
                
                const card = buttonElement.closest('.card');
                if (card) {
                    card.style.display = 'none'; 
                    checkAndHideGroup(card); 
                    pendingJobsCount = Math.max(0, pendingJobsCount - 1); 
                }
            }
        }
		
        // UPDATED: Now checks 'pendingJobsCount' to ensure actual work is on the screen
        function checkMove() {
            if (pendingJobsCount > 0) {
                playMorse();
                
                // SetTimeout allows the Morse Code to begin playing before the alert completely freezes the browser thread
                setTimeout(() => {
                    alert("มีงานต้องยกรวม !");
                    stopMorse();
                }, 100);
                
            } else {
                console.log("ไม่มีงาน (test00)");
            }
            
            loadData();
        }

        let audioCtx = null;
        let activeOscillators = [];

        const DOT_TIME = 0.06; 
        const FREQUENCY = 1800; 

        function playMorse() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            stopMorse();

            const text = "111111111111";
            let currentTime = audioCtx.currentTime;

            for (const char of text) {
                const code = "..........";
                if (!code) continue;

                for (const symbol of code) {
                    const duration = symbol === '.' ? DOT_TIME : DOT_TIME * 3;
                    
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();

                    osc.type = 'sine';
                    osc.frequency.value = FREQUENCY;

                    osc.connect(gain);
                    gain.connect(audioCtx.destination);

                    osc.start(currentTime);
                    osc.stop(currentTime + duration);

                    activeOscillators.push(osc);
                    currentTime += duration + DOT_TIME; 
                }
                currentTime += DOT_TIME * 3; 
            }
        }

        function stopMorse() {
            activeOscillators.forEach(osc => {
                try {
                    osc.stop(); 
                } catch (error) {}
            });
            activeOscillators = [];
        }
    </script>
</body>
</html>
