<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏷️ งานเตรียมเหล็กแบน</title>
    <!-- Include HTML5-QRCode Library for Camera Scanning -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary-color: #4F46E5;
            --primary-hover: #4338CA;
            --success-color: #10B981;
            --success-hover: #059669;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --status-waiting-bg: #FEF3C7;
            --status-waiting-text: #92400E;
			--status-preparing-bg: #FFFFFF;
            --status-preparing-text: #92400E;
            --grid-bg: #F9FAFB;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0.5rem;
            line-height: 1;
        }

        .header-title {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            font-weight: 700;
        }

        /* Updated Action Bar Layout */
        .action-bar {
            max-width: 1200px;
            margin: 0 auto 1.5rem auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .action-right {
            display: flex;
            gap: 0.75rem;
        }

        /* Dropdown & Input Styling */
        .gate-dropdown {
            padding: 0.625rem 2rem 0.625rem 1rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-main);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23111827%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 0.7rem top 50%;
            background-size: 0.65rem auto;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .gate-dropdown:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .form-input {
            background-image: none !important;
            padding-right: 1rem !important;
            cursor: text !important;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .modal-title {
            margin-top: 0;
            margin-bottom: 1rem;
            font-size: 1.25rem;
            color: var(--text-main);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        /* Loading Spinner Styles */
        .spinner-container {
            text-align: center;
            padding: 1rem;
        }

        .spinner {
            border: 4px solid rgba(79, 70, 229, 0.1);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border-left-color: var(--primary-color);
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .card-header {
            padding: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #FAFAFA;
        }

        .header-blue {
            background-color: #2180ff !important;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-checkbox {
            width: 1.125rem;
            height: 1.125rem;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .card-title {
            margin: 0;
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge.waiting {
            background-color: var(--status-waiting-bg);
            color: var(--status-waiting-text);
        }
		
		.badge.preparing {
            background-color: var(--status-preparing-bg);
            color: var(--status-preparing-text);
        }

        .card-body {
            padding: 0.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            font-size: 0.875rem;
        }

        .info-label {
            color: var(--text-muted);
            font-weight: 500;
            flex-basis: 40%;
        }

        .info-value {
            color: var(--text-main);
            font-weight: 500;
            flex-basis: 60%;
            text-align: right;
            word-break: break-word;
        }

        .material-name {
            font-weight: 600;
            color: var(--primary-color);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background-color: var(--grid-bg);
            margin: 0.5rem 0;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .card-footer {
            padding: 0.5rem;
            border-top: 1px solid var(--border-color);
            background-color: #FAFAFA;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .btn {
            padding: 0.625rem 1.25rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-flex {
            flex: 1;
            padding: 0.5rem 1rem;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-success {
            background-color: var(--success-color);
            color: white;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .btn-success:hover {
            background-color: var(--success-hover);
        }

        .btn-outline {
            background-color: #ffb100;
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background-color: #ff9900;
            border-color: var(--text-muted);
        }
        
        .btn-transparent {
            background-color: transparent !important;
        }

        .btn-disabled-transparent {
            background-color: transparent !important;
            color: var(--text-muted) !important;
            border: 1px solid var(--border-color);
            cursor: not-allowed !important;
            box-shadow: none !important;
            opacity: 0.7;
        }
        
        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            color: var(--text-muted);
            padding: 3rem;
        }
        
        .loading-state {
            text-align: center;
            grid-column: 1 / -1;
            color: var(--primary-color);
            padding: 3rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <h2 class="header-title">🏷️ งานเตรียมเหล็กแบน</h2>
    
    <div class="action-bar">
        <!-- Dropdown on the left side with onchange event -->
        <select id="gateFilter" class="gate-dropdown" onchange="refreshData()">
            <option value="" disabled>เลือกประตู</option>
            <option value="K2" selected>K2</option>
            <option value="K4">K4</option>
            <option value="K6">K6</option>
            <option value="K8">K8</option>
        </select>
        
        <!-- Buttons on the right side -->
        <div class="action-right">
            <button class="btn btn-outline" onclick="printSelected()">🖨️ พิมพ์</button>
            <button class="btn btn-primary" onclick="runFunctionForSelected()">📥 รับงาน</button>
        </div>
    </div>

    <!-- Print Modal Popup -->
    <div id="printModal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">เลือกเครื่องพิมพ์</h3>
            <select id="printerSelect" class="gate-dropdown" style="width: 100%;">
                <option value="17">PWA2</option>
                <option value="19">PWB3</option>
                <option value="47">PWO4</option>
            </select>
            <div class="modal-actions">
                <button class="btn btn-primary" onclick="closePrintModal()">ยกเลิก</button>
                <button class="btn btn-outline" onclick="confirmPrint()">พิมพ์</button>
            </div>
        </div>
    </div>

    <!-- Match (จับคู่) Modal Popup -->
    <div id="matchModal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">จับคู่</h3>
            
            <!-- Scan QR Code Row -->
            <div style="margin-bottom: 1rem;">
                <label style="display:block; margin-bottom: 0.5rem; font-size: 0.875rem; color: var(--text-muted);">สแกน QR Code</label>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="qrInput" class="gate-dropdown form-input" style="flex: 1;" placeholder="ข้อมูล QR Code">
                    <button class="btn btn-outline" onclick="startScanner()" style="padding: 0.625rem 0.75rem;">📷 สแกน</button>
                </div>
                <!-- Div element for the scanner video feed -->
                <div id="qr-reader" style="width: 100%; margin-top: 0.5rem; display: none; border-radius: 6px; overflow: hidden;"></div>
            </div>

            <!-- Disabled System Data Row -->
            <div style="margin-bottom: 1.5rem;">
                <label style="display:block; margin-bottom: 0.5rem; font-size: 0.875rem; color: var(--text-muted);">ข้อมูลระบบ (Bundle)</label>
                <input type="text" id="dummyInput" class="gate-dropdown form-input" style="width: 100%; background-color: #f3f4f6; color: #9ca3af; cursor: not-allowed;" disabled>
            </div>

            <!-- Actions -->
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeMatchModal()">ยกเลิก</button>
                <button class="btn btn-success" onclick="confirmMatch()">จับคู่</button>
            </div>
        </div>
    </div>

    <!-- API Process Loading Modal Popup -->
    <div id="loadingModal" class="modal-overlay" style="z-index: 2000;">
        <div class="modal-content spinner-container">
            <div class="spinner"></div>
            <h3 class="modal-title" style="margin-bottom: 0;">กำลังดำเนินการ...</h3>
            <p style="color: var(--text-muted); margin-top: 0.5rem; font-size: 0.875rem;">กรุณารอสักครู่</p>
        </div>
    </div>

    <div class="grid-container" id="card-container">
        <div class="loading-state">Loading data from server...</div>
    </div>

    <script>
		const MAIN_URL = "https://script.google.com/macros/s/AKfycbyiW4xqcYUY5OBgwpxhrAcpBcrepx1Bc52L-9KEzSOwdpgshiIYtIYa01Kd1SnXR0Z9-A/exec?"
        const UNCLAIM_URL = MAIN_URL + "action=getunclaim&gate_id=";
        const CLAIMED_URL = MAIN_URL + "action=getclaimed&gate_id=";
		const PRINT_URL = MAIN_URL + "action=printbundle";
		const ACCEPT_URL = MAIN_URL + "action=acceptbundle";
		const SUBMIT_URL = MAIN_URL + "action=submitbundle";
		const GETBUNDLE_URL = MAIN_URL + "action=getbundle";
		const SUBMITSCAN_URL = MAIN_URL + "action=submitscan";
		
		
		const gateIDK2 = "32";
		const gateIDK4 = "34";
		const gateIDK6 = "36";
		const gateIDK8 = "38";

        let pendingPrintIds = [];
        
        // Variables for match matching
        let currentMatchDoId = null;
        let currentBundleShowText = "";
        let html5QrCode = null;

        // Global Modal Display Functions
        function showLoading() {
            document.getElementById('loadingModal').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingModal').style.display = 'none';
        }
		
        async function fetchUnclaimData() {
            const gate = document.getElementById('gateFilter').value;
			var url = "";
			if (gate === "K2"){
				url = UNCLAIM_URL + gateIDK2;
			} else if (gate === "K4") {
				url = UNCLAIM_URL + gateIDK4;
			} else if (gate === "K6") {
				url = UNCLAIM_URL + gateIDK6;
			} else if (gate === "K8") {
				url = UNCLAIM_URL + gateIDK8;
			}
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    redirect: "follow"
                });

                if (!response.ok) throw new Error("Unclaim API returned " + response.status);
                
                const returnData = await response.json();
                return returnData;
            } catch (error) {
                console.error("Unclaim error:", error.message);
                return null;
            }
        }
      
        async function fetchClaimedData() {
            const gate = document.getElementById('gateFilter').value;
			var url = "";
			if (gate === "K2"){
				url = CLAIMED_URL + gateIDK2;
			} else if (gate === "K4") {
				url = CLAIMED_URL + gateIDK4;
			} else if (gate === "K6") {
				url = CLAIMED_URL + gateIDK6;
			} else if (gate === "K8") {
				url = CLAIMED_URL + gateIDK8;
			}
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    redirect: "follow"
                });

                if (!response.ok) throw new Error("Claimed API returned " + response.status);

                const returnData = await response.json();
                return returnData;
            } catch (error) {
                console.error("Claimed error:", error.message);
                return null; 
            }
        }
		
		function extractDataArray(apiResponse) {
            if (!apiResponse) return [];
            if (Array.isArray(apiResponse)) return apiResponse;
            if (typeof apiResponse === 'string') {
                try {
                    const parsed = JSON.parse(apiResponse);
                    return Array.isArray(parsed) ? parsed : (parsed.data || []);
                } catch (e) {
                    return [];
                }
            }
            if (typeof apiResponse === 'object') {
                if (Array.isArray(apiResponse.data)) return apiResponse.data;
                if (Array.isArray(apiResponse.items)) return apiResponse.items;
                if (Array.isArray(apiResponse.result)) return apiResponse.result;
                for (let key in apiResponse) {
                    if (Array.isArray(apiResponse[key])) return apiResponse[key];
                }
            }
            return [];
        }

        async function initDashboard() {
            const container = document.getElementById('card-container');
            try {
                const [unclaimResult, claimedResult] = await Promise.all([
                    fetchUnclaimData(),
                    fetchClaimedData()
                ]);

                const unclaimArray = extractDataArray(unclaimResult);
                const claimedArray = extractDataArray(claimedResult);

                const mergedData = [...unclaimArray, ...claimedArray];
                renderCards(mergedData);

            } catch (error) {
                container.innerHTML = `<div class='empty-state' style='color:red;'>Cannot load data. Error: ${error.message}</div>`;
                console.error("Dashboard init error:", error);
            }
        }

        function renderCards(dataArray) {
            const container = document.getElementById('card-container');
            if (!dataArray || dataArray.length === 0) {
                container.innerHTML = '<div class="empty-state">No data available to display.</div>';
                return;
            }

            container.innerHTML = dataArray.map((item, index) => {
                // Calculate if this item should also submit after accepting
                const shouldSubmit = (!item.canPrint && item.unpackQuantity === 0);

                return `
                    <div class="card">
                        <div class="card-header ${!item.canAccept ? 'header-blue' : ''}">
                            <div class="header-left">
                                <!-- Storing the shouldSubmit flag in a data attribute for bulk processing -->
                                <input type="checkbox" class="card-checkbox" value="${item.id}" id="chk-${item.id}-${index}" data-should-submit="${shouldSubmit}">
                                <label for="chk-${item.id}-${index}" class="card-title">${item.doItemDesc || 'N/A'}</label>
                            </div>
                            <span class="badge ${item.status ? item.status.toLowerCase() : ''}">${item.status || 'Unknown'}</span>
                        </div>
                        
                        <div class="card-body">
                            <div class="info-row">
                                <span class="info-label">ชื่อลูกค้า</span>
                                <span class="info-value">${item.companyName || 'N/A'}</span>
                            </div>
                            
                            <div class="info-row">
                                <span class="info-label">ชื่อผลิตภัณฑ์</span>
                                <span class="info-value material-name">${item.materialName || 'N/A'}</span>
                            </div>

                            <div class="info-row">
                                <span class="info-label">Batch</span>
                                <span class="info-value">${item.batch || 'N/A'}</span>
                            </div>

                            <div class="stats-grid">
                                <div class="stat-box">
                                    <span class="stat-label">จำนวนขาย</span>
                                    <span class="stat-value">${item.actualQuantity || 0}</span>
                                </div>
                                
                                <div class="stat-box">
                                    <span class="stat-label">จำนวนต่อแพ็ค</span>
                                    <span class="stat-value">${item.packageSize || 0}</span>
                                </div>

                                <div class="stat-box">
                                    <span class="stat-label">มัดเต็ม</span>
                                    <span class="stat-value">${item.pack || 0}</span>
                                </div>

                                <div class="stat-box">
                                    <span class="stat-label">มัดเศษ</span>
                                    <span class="stat-value">${item.unpackQuantity || 0}</span>
                                </div>
                            </div>

                            <div class="info-row">
                                <span class="info-label">ข้อควรระวัง</span>
                                <span class="info-value">${item.materialText || '-'}</span>
                            </div>
                        </div>
                        
                        <div class="card-footer">
                            <button class="btn btn-flex ${item.canAccept ? 'btn-primary' : 'btn-disabled-transparent'}" 
                                    ${!item.canAccept ? 'disabled' : ''}
                                    onclick="acceptSingle('${item.id}', ${shouldSubmit})">รับงาน</button>
                            
                            ${item.canPrint ? `<button class="btn btn-flex btn-outline ${item.isAlreadyPrint ? 'btn-transparent' : ''}" onclick="printSingle('${item.id}')">พิมพ์</button>` : ''}
                            
                            <button class="btn btn-flex btn-success" onclick="processItem('${item.id}')">จับคู่</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function refreshData() {
            const container = document.getElementById('card-container');
            container.innerHTML = '<div class="loading-state">Loading data from server...</div>';
            initDashboard();
        }

        // ---------- New จับคู่ (Match) & Scanner Functions ---------- //

        async function processItem(id) {
            console.log("Processing item ID (Match):", id);
            currentMatchDoId = id;
            
            showLoading();
            const data = await getBundle(id);
            hideLoading();
            
            if (data && data.bundle) {
                document.getElementById('dummyInput').value = data.bundle;
                currentBundleShowText = data.bundleShowText; // kept as variable
                document.getElementById('qrInput').value = ""; // clear previous input
                document.getElementById('matchModal').style.display = 'flex';
            } else {
                alert("ไม่สามารถดึงข้อมูล Bundle ได้ (Failed to get bundle data)");
            }
        }

        function startScanner() {
            const qrReaderDiv = document.getElementById('qr-reader');
            qrReaderDiv.style.display = 'block';
            
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("qr-reader");
            }
            
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: {width: 250, height: 250} },
                (decodedText, decodedResult) => {
                    // Success callback
                    document.getElementById('qrInput').value = decodedText;
                    stopScanner();
                },
                (errorMessage) => {
                    // Parse error, ignore and keep scanning
                }
            ).catch((err) => {
                console.error("Cannot start scanner:", err);
                alert("ไม่สามารถเข้าถึงกล้องได้ (Cannot access camera)");
                qrReaderDiv.style.display = 'none';
            });
        }

        function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    document.getElementById('qr-reader').style.display = 'none';
                }).catch((err) => {
                    console.error("Failed to stop scanner", err);
                });
            } else {
                document.getElementById('qr-reader').style.display = 'none';
            }
        }

        function closeMatchModal() {
            document.getElementById('matchModal').style.display = 'none';
            stopScanner();
        }

        async function confirmMatch() {
            const qrText = document.getElementById('qrInput').value;
            const dummyText = document.getElementById('dummyInput').value;
            
            if (!qrText || !dummyText) {
                alert("กรุณาสแกน QR Code ก่อนยืนยัน");
                return;
            }
            
            // Split arrays by '*'
            const qrParts = qrText.split('*');
            const dummyParts = dummyText.split('*');
            
            // Validation to ensure format allows section 2 check
            if (qrParts.length < 2 || dummyParts.length < 2) {
                alert("รูปแบบข้อมูลไม่ถูกต้อง");
                return;
            }
            
            // Get section 2 (index 1) for both variables
            const scanSection2 = qrParts[1];
            const dummySection2 = dummyParts[1];
            
            if (scanSection2 === dummySection2) {
                // Prepare arguments
                const bundleScan = qrParts[0];                     // Section 1 of QR code
                const fullBundleScan = qrText;                     // Full QR code text
                const bundleDummyScan = dummyParts[0];             // Section 1 of disabled text
                const fullBundleDummyScan = dummyText;             // Full disabled text
                const newUnpackValue = dummyParts[3] || "";        // Section 4 (index 3) of disabled text
                
                showLoading();
                
                // Submit matched data
                const result = await submitScan(
                    currentMatchDoId, 
                    bundleScan, 
                    fullBundleScan, 
                    bundleDummyScan, 
                    fullBundleDummyScan, 
                    newUnpackValue
                );
                
                hideLoading();
                
                if (result) {
                    alert(result);
                    closeMatchModal();
                    refreshData(); // Optionally refresh grid to show updated status
                } else {
                    alert("เกิดข้อผิดพลาดในการส่งข้อมูล");
                }
            } else {
                alert("ข้อมูลไม่ตรงกัน!\nQR: " + scanSection2 + "\nSystem: " + dummySection2);
            }
        }

        // ---------- End New Functions ---------- //


        // Functions for Accept
        async function runFunctionForSelected() {
            const checkedBoxes = document.querySelectorAll('.card-checkbox:checked');
            
            if (checkedBoxes.length === 0) {
                alert("Please select at least one item first.");
                return;
            }
            
            showLoading(); // Display the loading popup
            let allSuccess = true;

            // Iterate over each checkbox and process individually
            for (const checkbox of checkedBoxes) {
                const id = checkbox.value;
                const shouldSubmit = checkbox.getAttribute('data-should-submit') === 'true';

                console.log(`Accepting DO ID: ${id}`);
                const result = await acceptBundle(id);
                
                if (result) {
                    // Check if it also requires a submit
                    if (shouldSubmit) {
                        console.log(`Submitting DO ID: ${id}`);
                        const submitResult = await submitBundle(id);
                        if (!submitResult) {
                            allSuccess = false;
                        }
                    }
                } else {
                    allSuccess = false;
                }
            }
            
            hideLoading(); // Hide the loading popup

            // Show consolidated alert
            if (allSuccess) {
                alert("All accept (and applicable submit) commands sent successfully!");
            } else {
                alert("Some commands failed. Check the console for details.");
            }

            refreshData(); // Refresh the grid to reflect accepted statuses
        }

        async function acceptSingle(id, shouldSubmit = false) {
            showLoading(); // Display the loading popup
            
            const result = await acceptBundle(id);
            if (result) {
                if (shouldSubmit) {
                    const submitResult = await submitBundle(id);
                    hideLoading(); // Hide the loading popup
                    
                    if (submitResult) {
                        alert("Accept and Submit commands sent successfully!");
                    } else {
                        alert("Accept succeeded, but Submit failed. Check console for details.");
                    }
                } else {
                    hideLoading(); // Hide the loading popup
                    alert("Accept command sent successfully!");
                }
            } else {
                hideLoading(); // Hide the loading popup
                alert("Error sending accept command. Check console for details.");
            }
            
            refreshData(); // Refresh the grid to reflect statuses
        }

        // Functions for the Print Modal
        function printSelected() {
            const checkedBoxes = document.querySelectorAll('.card-checkbox:checked');
            const selectedIds = Array.from(checkedBoxes).map(checkbox => checkbox.value);
            
            if (selectedIds.length === 0) {
                alert("Please select at least one item first to print.");
                return;
            }
            
            pendingPrintIds = selectedIds;
            document.getElementById('printModal').style.display = 'flex';
        }

        function printSingle(id) {
            pendingPrintIds = [id];
            document.getElementById('printModal').style.display = 'flex';
        }

        function closePrintModal() {
            document.getElementById('printModal').style.display = 'none';
            pendingPrintIds = [];
        }

        async function confirmPrint() {
            const printerId = document.getElementById('printerSelect').value;
            
            if (pendingPrintIds.length === 0) {
                alert("No items selected for printing.");
                closePrintModal();
                return;
            }
            
            // Clone the array because we clear pendingPrintIds in closePrintModal
            const idsToPrint = [...pendingPrintIds];
            closePrintModal();
            
            showLoading(); // Can also utilize the loading modal for bulk printing for better UX
            let allSuccess = true;

            // Iterate over each ID and print individually
            for (const id of idsToPrint) {
                console.log(`Printing DO ID: ${id} on Printer: ${printerId}`);
                const result = await printBundle(id, printerId);
                
                if (!result) {
                    allSuccess = false;
                }
            }
            
            hideLoading();

            // Show consolidated alert
            if (allSuccess) {
                alert("All print commands sent successfully!");
            } else {
                alert("Some print commands failed. Check the console for details.");
            }
        }
		
		async function printBundle(do_id, printer_id) {
			var url = "";
			url = url + PRINT_URL + "&do_id=" + do_id + "&printer_id=" + printer_id;
			
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    redirect: "follow"
                });

                if (!response.ok) throw new Error("Print API returned " + response.status);
                
                const returnData = await response.json();
                console.log(`Print successful for ${do_id}:`, returnData);
                return returnData;
            } catch (error) {
                console.error(`Print error for ${do_id}:`, error.message);
                return null;
            }
        }
		
		async function acceptBundle(do_id) {
			var url = "";
			var gate_id = "";
			const gate = document.getElementById('gateFilter').value;
			if (gate === "K2"){
				gate_id = gateIDK2;
			} else if (gate === "K4") {
				gate_id = gateIDK4;
			} else if (gate === "K6") {
				gate_id = gateIDK6;
			} else if (gate === "K8") {
				gate_id = gateIDK8;
			}
			url = url + ACCEPT_URL + "&do_id=" + do_id + "&gate_id=" + gate_id;
			
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    redirect: "follow"
                });

                if (!response.ok) throw new Error("Accept API returned " + response.status);
                
                const returnData = await response.json();
                console.log(`Accept successful for ${do_id}:`, returnData);
                return returnData;
            } catch (error) {
                console.error(`Accept error for ${do_id}:`, error.message);
                return null;
            }
        }
		
		async function submitBundle(do_id) {
			var url = "";
			
			url = url + SUBMIT_URL + "&do_id=" + do_id;
			
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    redirect: "follow"
                });

                if (!response.ok) throw new Error("submit API returned " + response.status);
                
                const returnData = await response.json();
                console.log(`submit successful for ${do_id}:`, returnData);
                return returnData;
            } catch (error) {
                console.error(`submit error for ${do_id}:`, error.message);
                return null;
            }
        }
		
		async function getBundle(do_id) {
			var url = "";
			
			url = url + GETBUNDLE_URL + "&do_id=" + do_id;
			
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    redirect: "follow"
                });

                if (!response.ok) throw new Error("getBundle API returned " + response.status);
                
                let returnData = await response.json();
                
                // FIX: Parse the stringified JSON returned by the Apps Script API
                if (typeof returnData === 'string') {
                    try {
                        returnData = JSON.parse(returnData);
                    } catch (e) {
                        console.error("JSON parse error in getBundle:", e);
                    }
                }

                console.log(`getBundle successful for ${do_id}:`, returnData);
                return returnData;
            } catch (error) {
                console.error(`getBundle error for ${do_id}:`, error.message);
                return null;
            }
        }
		
		async function submitScan(do_id, bundleScan, fullBundleScan, bundleDummyScan, fullBundleDummyScan, newUnpackValue) {
			let url = SUBMITSCAN_URL + "&do_id=" + do_id;
            url += "&bundleScan=" + encodeURIComponent(bundleScan);
            url += "&fullBundleScan=" + encodeURIComponent(fullBundleScan);
            url += "&bundleDummyScan=" + encodeURIComponent(bundleDummyScan);
            url += "&fullBundleDummyScan=" + encodeURIComponent(fullBundleDummyScan);
            url += "&newUnpackValue=" + encodeURIComponent(newUnpackValue);
			
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    redirect: "follow"
                });

                if (!response.ok) throw new Error("submitScan API returned " + response.status);
                
                const returnData = await response.json();
                console.log(`submitScan successful for ${do_id}:`, returnData);
                return returnData;
            } catch (error) {
                console.error(`submitScan error for ${do_id}:`, error.message);
                return null;
            }
        }

        initDashboard();
    </script>
