    <script>
        document.getElementById('bj-checkbox').addEventListener('change', function() {
        document.getElementById('bjamount').style.display = this.checked ? 'block' : 'none';
    });

    document.getElementById('bn-checkbox').addEventListener('change', function() {
        document.getElementById('bnamount').style.display = this.checked ? 'block' : 'none';
    });


	function clearScreen(){
		document.getElementById('size').selectedIndex = 0;
		document.querySelectorAll('input[type="radio"]').forEach(radio => radio.checked = false);
		document.querySelectorAll('input[type="checkbox"]').forEach(radio => radio.checked = false);
		document.getElementById('bjamount').value = "";
		document.getElementById('bnamount').value = "";
		document.getElementById('bjamount').style.display = 'none';
		document.getElementById('bnamount').style.display = 'none';
	}
	
	function save() {
    // Get values from the form
	var url = "https://docs.google.com/forms/d/e/1FAIpQLSf4OqAabdM32leCV0UbLyqG-rmGZQNnxBBcm-ZlP5HLrYh4Fw/formResponse?entry.1362014552=";
	var entrynongi = "&entry.1472257121="
	var entrygi = "&entry.1655074373=";
	var sizeElement = document.getElementById('size');
    var size = sizeElement.value;
    var sizeid = sizeElement.selectedIndex;
    var nongi = document.getElementById('nongi').checked;
    var bj = document.getElementById('bj-checkbox').checked;
	var bn = document.getElementById('bn-checkbox').checked;
	var bjamount = document.getElementById('bjamount').value || 0;
	var bnamount = document.getElementById('bnamount').value || 0;
	var parsebjamount = parseInt(bjamount);
	var parsebnamount = parseInt(bnamount);
	var alertMessage = size;
	
	// Check if size are selected
    if (sizeid === 0) {
        alert("กรุณาเลือกไซส์ของท่อ");
        return;
    }
	
	if (nongi) {
		var amount = parsebjamount + parsebnamount;
		amount = -amount;
		alertMessage += " เหล็กดำ จำนวน " + amount + " เส้น";
		url += size + entrynongi + amount + entrygi + 0;
	} else {
		var amount = parsebjamount + parsebnamount;
		amount = -amount;
		alertMessage += " GI จำนวน " + amount + " เส้น"
		url += size + entrygi + amount + entrynongi + 0;
	}
    // Send data to Google Sheets
    var img = document.createElement("img");
    img.src = url;
    
    // Display alert
    alert(alertMessage);

    // Clear the form
    document.querySelectorAll('input[type="radio"]').forEach(radio => radio.checked = false);
	document.querySelectorAll('input[type="checkbox"]').forEach(radio => radio.checked = false);
	document.getElementById('bjamount').style.display = 'none';
	document.getElementById('bnamount').style.display = 'none';
	document.getElementById('bjamount').value = "";
	document.getElementById('bnamount').value = "";
}
