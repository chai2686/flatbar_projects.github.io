<body class="p-4 md:p-8" style="padding: 5px;">

            <div class="p-6">

                        <div class="p-3 bg-white divide-y divide-gray-100">
                            <div class="py-2 flex justify-between items-center" style="padding-top: 0px; padding-bottom: 0px;">
                                <span class="text-sm text-gray-500 bg-gray-100 px-2 py-0.5 rounded">Operator</span>
                                <span id="k2op" class="font-semibold text-gray-800"></span>
                            </div>
                            <div class="py-2 flex justify-between items-center" style="padding-top: 0px; padding-bottom: 0px;">
                                <span class="text-sm text-gray-500 bg-gray-100 px-2 py-0.5 rounded">Inspector</span>
                                <span id="k2in" class="font-semibold text-gray-800"></span>
                            </div>
                        </div>
                    </div>
                    <div class="border-2 border-[#4fd1c5] rounded-xl overflow-hidden shadow-sm transition hover:shadow-md">
                        <div class="bg-[#4fd1c5] text-gray-900 font-bold p-2 text-center text-lg" style="padding: 5px;">โซน K4</div>
                        <div class="p-3 bg-white divide-y divide-gray-100">
                            <div class="py-2 flex justify-between items-center" style="padding-top: 0px; padding-bottom: 0px;">
                                <span class="text-sm text-gray-500 bg-gray-100 px-2 py-0.5 rounded">Operator</span>
                                <span id="k4op" class="font-semibold text-gray-800"></span>
                            </div>
                            <div class="py-2 flex justify-between items-center" style="padding-top: 0px; padding-bottom: 0px;">
                                <span class="text-sm text-gray-500 bg-gray-100 px-2 py-0.5 rounded">Inspector</span>
                                <span id="k4in" class="font-semibold text-gray-800"></span>
                            </div>
                        </div>
                    </div>
                    <div class="border-2 border-[#ff9ff3] rounded-xl overflow-hidden shadow-sm transition hover:shadow-md">
                        <div class="bg-[#ff9ff3] text-gray-900 font-bold p-2 text-center text-lg" style="padding: 5px;">โซน K6</div>
                        <div class="p-3 bg-white divide-y divide-gray-100">
                            <div class="py-2 flex justify-between items-center" style="padding-top: 0px; padding-bottom: 0px;">
                                <span class="text-sm text-gray-500 bg-gray-100 px-2 py-0.5 rounded">Operator</span>
                                <span id="k6op" class="font-semibold text-gray-800"></span>
                            </div>
                            <div class="py-2 flex justify-between items-center" style="padding-top: 0px; padding-bottom: 0px;">
                                <span class="text-sm text-gray-500 bg-gray-100 px-2 py-0.5 rounded">Inspector</span>
                                <span id="k6in" class="font-semibold text-gray-800"></span>
                            </div>
                        </div>
                    </div>
                    <div class="border-2 border-gray-300 rounded-xl overflow-hidden shadow-sm transition hover:shadow-md bg-gray-50">
                        <div class="bg-gray-200 text-gray-700 font-bold p-2 text-center text-sm md:text-base leading-tight flex flex-col justify-center h-[44px]" style="padding: 5px;">
                            ตรวจสอบ Sr.inspector
                        </div>
                        <div class="p-3 flex items-center justify-center h-[90px]">
                            <span id="srin" class="font-bold text-xl text-gray-800 bg-white px-6 py-2 rounded-lg border border-gray-200 shadow-sm">รัตนะ</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="md:col-span-2 bg-white rounded-2xl shadow-md overflow-hidden border-t-4 border-[#38b2ac]">
                <div class="p-6" style="padding-top: 10px;">
                    <div class="flex flex-col md:flex-row md:items-center justify-between mb-4 border-b border-gray-100 pb-4 gap-4" style="padding-bottom: 0px;">
                        <h2 class="text-xl font-bold text-[#2b6cb0] flex items-center">
                            <svg class="w-6 h-6 mr-2 text-[#38b2ac]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            เวรเบรคบ่าย
                        </h2>
                    </div>
                    
                    <div class="flex flex-wrap gap-2 mt-4">
                        <span id="ins1" class="px-4 py-2 text-blue-700 border border-blue-200 hover:bg-blue-500 hover:text-white transition-colors duration-200 rounded-lg font-medium shadow-sm" style="background-color: lightgray;"></span>
                        <span id="ins2" class="px-4 py-2 text-blue-700 border border-blue-200 hover:bg-blue-500 hover:text-white transition-colors duration-200 rounded-lg font-medium shadow-sm" style="background-color: lightgray;"></span>
                        <span id="opt1" class="px-4 py-2 text-blue-700 border border-blue-200 hover:bg-blue-500 hover:text-white transition-colors duration-200 rounded-lg font-medium shadow-sm"></span>
                        <span id="opt2" class="px-4 py-2 text-blue-700 border border-blue-200 hover:bg-blue-500 hover:text-white transition-colors duration-200 rounded-lg font-medium shadow-sm"></span>
                        <span id="opt3" class="px-4 py-2 text-blue-700 border border-blue-200 hover:bg-blue-500 hover:text-white transition-colors duration-200 rounded-lg font-medium shadow-sm"></span>
                        <span id="opt4" class="px-4 py-2 text-blue-700 border border-blue-200 hover:bg-blue-500 hover:text-white transition-colors duration-200 rounded-lg font-medium shadow-sm"></span>
                        <span id="opt5" class="px-4 py-2 text-blue-700 border border-blue-200 hover:bg-blue-500 hover:text-white transition-colors duration-200 rounded-lg font-medium shadow-sm"></span>
						<span id="opt6" class="px-4 py-2 text-blue-700 border border-blue-200 hover:bg-blue-500 hover:text-white transition-colors duration-200 rounded-lg font-medium shadow-sm"></span>
						<span id="opt7" class="px-4 py-2 text-blue-700 border border-blue-200 hover:bg-blue-500 hover:text-white transition-colors duration-200 rounded-lg font-medium shadow-sm"></span>
					</div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-md overflow-hidden border-t-4 border-[#ed8936]">
                <div class="bg-[#ed8936] p-3 text-center" style="padding: 5px">
                    <h2 class="text-lg font-bold text-white flex items-center justify-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        เวรทิ้งถุงมือ
                    </h2>
                </div>
                <div class="p-6 flex flex-col items-center justify-center h-[calc(100%-52px)] bg-orange-50/30">
                    <span onclick="initialData()" id="opt00" class="px-4 py-2 text-blue-700 border border-blue-200 hover:bg-blue-500 hover:text-white transition-colors duration-200 rounded-lg font-medium shadow-sm"></span>
                </div>
    
            </div>
            </div>
        </div>

    </div>
	<p style="font-size: 12px;text-align:right;padding-left: 60%;padding-top: 10px;margin-bottom: 5px;">Version 2.0 Beta</p>
    <p style="font-size: 12px;text-align:right;padding-left: 45%;margin-top: 0px;margin-bottom: 0px;">Powered by Flatbar Division™️</p>
	
	<script>
    document.addEventListener("DOMContentLoaded", fetchSheetData);

    async function fetchSheetData() {
        console.log("Fetching sheet data...");

        const part0 = "AIzaSyAFnyXSAki4Licz";
		const part1 = "KNhyEzbhHsvTC-abfAo";
		const apiKey = part0 + part1;
        const spreadsheetId = "1dGGGnSM23HxEChvN9A_LfbKrTVzPV30_ZBfRSt3ve9g";
        
        // Encode the Thai sheet name to ensure the URL is valid
        const sheetName = encodeURIComponent("ตารางเวรเหล็กแบน");
        
        // Fetch A3:H3 (8 columns) and B6:K6 (10 columns) in a single batch request
        const query = `ranges=${sheetName}!A3:H3&ranges=${sheetName}!B6:K6`;
        const url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values:batchGet?${query}&key=${apiKey}`;

        try {
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`HTTP error! Status: ${response.status}`);
            }
            
            const data = await response.json();

            // Extract the rows. Fallback to empty arrays if no data is found to prevent errors.
            const row3 = data.valueRanges[0]?.values?.[0] || [];
            const row6 = data.valueRanges[1]?.values?.[0] || [];

            // Map the sequential IDs to their respective columns in Row 3 (A through H)
            const row3Ids = ["date", "k6op", "k6in", "k4op", "k4in", "k2op", "k2in", "srin"];
            row3Ids.forEach((id, index) => {
                const el = document.getElementById(id);
                // Assign value, or an empty string if the cell is blank
                if (el) el.textContent = row3[index] || ""; 
            });

            // Map the sequential IDs to their respective columns in Row 6 (B through K)
            const row6Ids = ["ins1", "ins2", "opt1", "opt2", "opt3", "opt4", "opt5", "opt6", "opt7", "opt00"];
            row6Ids.forEach((id, index) => {
                const el = document.getElementById(id);
                if (el) el.textContent = row6[index] || "";
            });

            console.log("Data successfully loaded and applied.");

        } catch (error) {
            console.error("Failed to fetch sheet data:", error);
        }
    }
</script>
